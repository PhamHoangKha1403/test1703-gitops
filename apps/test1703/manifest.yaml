apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test1703-backend
    helios.io/managed-by: operator
  name: test1703-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test1703-backend
  template:
    metadata:
      labels:
        app: test1703-backend
    spec:
      containers:
      - env:
        - name: NODE_ENV
          value: production
        image: phamhoangkha1403/phamhoangkha1403:latest
        name: test1703-backend
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: test1703-backend
  name: test1703-backend
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: test1703-backend
  type: ClusterIP

---
apiVersion: v1
data:
  DB_HOST: test1703-backend-db
  DB_NAME: db
  DB_PORT: "5432"
  DB_SECRET_NAME: test1703-backend-db-secret
  DB_STORAGE: 1Gi
  DB_TYPE: postgres
  DB_VERSION: "16"
kind: ConfigMap
metadata:
  labels:
    helios.io/managed-by: operator
    helios.io/trait: database
  name: test1703-backend-db-config
